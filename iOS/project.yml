name: Wanderlist
options:
  bundleIdPrefix: com.shimondeitel.wanderlist
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Wanderlist:
    type: application
    platform: iOS
    sources:
      - path: Wanderlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wanderlist
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Wanderlist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WanderlistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WanderlistTests
      - path: Wanderlist.storekit
    dependencies:
      - target: Wanderlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wanderlist.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WanderlistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WanderlistUITests
    dependencies:
      - target: Wanderlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wanderlist.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Wanderlist:
    build:
      targets:
        Wanderlist: all
        WanderlistTests: [test]
        WanderlistUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Wanderlist.storekit
    test:
      config: Debug
      storeKitConfiguration: Wanderlist.storekit
      targets:
        - WanderlistTests
        - WanderlistUITests
    archive:
      config: Release
